services:
  # ─────────────────────────────────────────────
  # APPLICATION STACK
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: demo-db
    environment:
      POSTGRES_DB: demodb
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - demo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demodb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./app/backend
    container_name: demo-backend
    environment:
      DATABASE_URL: postgresql://demo:demo123@db:5432/demodb
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - demo-net

  frontend:
    build: ./app/frontend
    container_name: demo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - demo-net

  # ─────────────────────────────────────────────
  # ELASTIC STACK
  # ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - demo-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 20s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    volumes:
      - ./elastic/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - demo-net

  heartbeat:
    image: docker.elastic.co/beats/heartbeat:8.13.0
    container_name: heartbeat
    user: root
    command: heartbeat -e --strict.perms=false
    volumes:
      - ./elastic/heartbeat/heartbeat.yml:/usr/share/heartbeat/heartbeat.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - demo-net

  metricbeat:
    image: docker.elastic.co/beats/metricbeat:8.13.0
    container_name: metricbeat
    user: root
    command: metricbeat -e --strict.perms=false
    volumes:
      - ./elastic/metricbeat/metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - demo-net

volumes:
  pgdata:
  esdata:

networks:
  demo-net:
    driver: bridge
