<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elastic Demo — Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #07101f;
      color: #e0e8f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    header { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
    header svg { width: 38px; height: 38px; }
    h1 {
      font-size: 1.7rem; font-weight: 700;
      background: linear-gradient(90deg, #0077cc, #00bfb3);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .card {
      background: #0d1f35; border: 1px solid #1a3356;
      border-radius: 12px; padding: 28px; width: 100%; max-width: 560px;
      box-shadow: 0 4px 32px rgba(0,119,204,0.08);
    }
    .status-bar { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .badge {
      font-size: 0.72rem; font-weight: 600; padding: 4px 10px;
      border-radius: 20px; display: flex; align-items: center; gap: 6px;
    }
    .badge .dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 1.8s infinite; }
    .badge.ok   { background: #0a2e1f; color: #00bf7d; border: 1px solid #00bf7d44; }
    .badge.ok .dot { background: #00bf7d; }
    .badge.err  { background: #2e0a0a; color: #ff4d4d; border: 1px solid #ff4d4d44; }
    .badge.err .dot { background: #ff4d4d; }
    .badge.checking { background: #1a2a3a; color: #7a9bb5; border: 1px solid #7a9bb544; }
    .badge.checking .dot { background: #7a9bb5; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.3 } }
    .add-row { display: flex; gap: 10px; margin-bottom: 22px; }
    input[type="text"] {
      flex: 1; background: #07101f; border: 1px solid #1a3356;
      color: #e0e8f4; border-radius: 8px; padding: 10px 14px;
      font-size: 0.9rem; outline: none; transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: #0077cc; }
    button {
      background: linear-gradient(135deg, #0077cc, #005fa3);
      color: #fff; border: none; border-radius: 8px;
      padding: 10px 18px; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    button.danger { background: linear-gradient(135deg, #c0392b, #922b21); }
    .task-list { list-style: none; }
    .task-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid #1a3356; gap: 10px;
    }
    .task-item:last-child { border-bottom: none; }
    .task-title { font-size: 0.92rem; flex: 1; }
    .empty { text-align: center; color: #3a5470; padding: 24px 0; font-size: 0.88rem; }
    .services {
      width: 100%; max-width: 560px; margin-top: 20px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    }
    .svc-card {
      background: #0d1f35; border: 1px solid #1a3356;
      border-radius: 10px; padding: 14px; text-align: center; font-size: 0.8rem;
    }
    .svc-card .label { color: #7a9bb5; margin-bottom: 6px; }
    .svc-card .port  { font-size: 1.1rem; font-weight: 700; color: #0099e6; }
    .footer { margin-top: 30px; font-size: 0.75rem; color: #2a4560; }
  </style>
</head>
<body>
<header>
  <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="16" cy="16" r="16" fill="#0077CC"/>
    <path d="M8 13.5h10.5a3.5 3.5 0 0 0 0-7H11A6 6 0 0 0 8 13.5z" fill="white"/>
    <path d="M8 18.5h10.5a3.5 3.5 0 0 1 0 7H11A6 6 0 0 1 8 18.5z" fill="white"/>
    <rect x="7" y="14.5" width="13" height="3" rx="1.5" fill="#00BFB3"/>
  </svg>
  <h1>Elastic Demo — Task Manager</h1>
</header>

<div class="card">
  <div class="status-bar">
    <span class="badge ok"><span class="dot"></span> Frontend :3000</span>
    <span class="badge checking" id="backendBadge"><span class="dot"></span> Backend :3001</span>
    <span class="badge checking" id="dbBadge"><span class="dot"></span> DB :5432</span>
  </div>
  <div class="add-row">
    <input type="text" id="taskInput" placeholder="Add a new task…" />
    <button onclick="addTask()">Add</button>
  </div>
  <ul class="task-list" id="taskList">
    <li class="empty">Loading…</li>
  </ul>
</div>

<div class="services">
  <div class="svc-card"><div class="label">Elasticsearch</div><div class="port">:9200</div></div>
  <div class="svc-card"><div class="label">Kibana</div><div class="port">:5601</div></div>
  <div class="svc-card"><div class="label">Heartbeat</div><div class="port">monitors</div></div>
</div>

<div class="footer">Monitored by Elastic Heartbeat &middot; Alerts configured in Kibana</div>

<script>
  const API = "http://localhost:3001";

  async function fetchTasks() {
    try {
      const res = await fetch(API + "/api/tasks");
      const tasks = await res.json();
      renderTasks(tasks);
      setStatus("backendBadge", true, "Backend :3001");
    } catch {
      setStatus("backendBadge", false, "Backend :3001");
      renderTasks([]);
    }
  }

  async function checkHealth() {
    try {
      const res = await fetch(API + "/health");
      const data = await res.json();
      setStatus("dbBadge", data.db === "connected", "DB :5432");
    } catch {
      setStatus("dbBadge", false, "DB :5432");
    }
  }

  function renderTasks(tasks) {
    const list = document.getElementById("taskList");
    if (!tasks.length) {
      list.innerHTML = '<li class="empty">No tasks yet — add one above!</li>';
      return;
    }
    list.innerHTML = tasks.map(t =>
      '<li class="task-item"><span class="task-title">' + esc(t.title) + '</span>' +
      '<button class="danger" onclick="deleteTask(' + t.id + ')">&#x2715;</button></li>'
    ).join("");
  }

  async function addTask() {
    const input = document.getElementById("taskInput");
    const title = input.value.trim();
    if (!title) return;
    await fetch(API + "/api/tasks", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title })
    });
    input.value = "";
    fetchTasks();
  }

  async function deleteTask(id) {
    await fetch(API + "/api/tasks/" + id, { method: "DELETE" });
    fetchTasks();
  }

  function setStatus(id, ok, label) {
    const b = document.getElementById(id);
    b.className = "badge " + (ok ? "ok" : "err");
    b.innerHTML = '<span class="dot"></span> ' + label + (ok ? " ✓" : " ✗");
  }

  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  document.getElementById("taskInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") addTask();
  });

  fetchTasks();
  checkHealth();
  setInterval(fetchTasks, 10000);
  setInterval(checkHealth, 10000);
</script>
</body>
</html>
