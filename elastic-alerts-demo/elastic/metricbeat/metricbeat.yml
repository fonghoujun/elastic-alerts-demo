metricbeat.modules:

  - module: docker
    metricsets:
      - container
      - cpu
      - diskio
      - healthcheck
      - info
      - memory
      - network
    period: 15s
    hosts: ["unix:///var/run/docker.sock"]
    enabled: true

  - module: system
    metricsets:
      - cpu
      - load
      - memory
      - network
    period: 15s

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]

setup.kibana:
  host: "http://kibana:5601"

setup.dashboards.enabled: false
setup.ilm.enabled: true

logging.level: info
